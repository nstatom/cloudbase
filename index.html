<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Ceilometer Cloud Viewer</title>

<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family: Arial;
margin:15px;
}

#controls{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:10px;
}

input{
padding:6px;
font-size:16px;
}

#plot{
height:500px;
border:2px solid #444;
margin-top:10px;
}

.error{
color:red;
}

.warning{
color:orange;
}

</style>
</head>

<body>

<h2>Airport Cloud Base Viewer</h2>

<div id="controls">

<label>ICAO:</label>
<input id="icaoInput" value="KSAN">

<label>Hours:</label>
<input id="hoursInput" value="24" type="number">

<button onclick="loadData()">Load</button>

</div>

<div id="messages"></div>

<div id="plot"></div>

<script>

const MAX_HOURS = 168;

// ---------------------
// LOAD DATA
// ---------------------

async function loadData(){

let icao =
document.getElementById("icaoInput").value.toUpperCase();

let hours =
parseInt(document.getElementById("hoursInput").value);

if(hours > MAX_HOURS){

hours = MAX_HOURS;

document.getElementById("hoursInput").value = MAX_HOURS;

document.getElementById("messages").innerHTML =
"<span class='warning'>Max hours is 168</span>";

}

const url =
`https://aviationweather.gov/api/data/metar?ids=${icao}&format=json&hours=${hours}`;

try{

const response = await fetch(url);

if(!response.ok){
throw new Error("API request failed");
}

const data = await response.json();

if(data.length === 0){

document.getElementById("messages").innerHTML =
"<span class='error'>No METAR data returned</span>";

return;
}

plotClouds(data);

}
catch(err){

console.error(err);

document.getElementById("messages").innerHTML =
"<span class='error'>Download failed</span>";

}

}

// ---------------------
// PARSE CLOUD DATA
// ---------------------

function plotClouds(data){

let times = [];
let heights = [];
let colors = [];

data.forEach(m => {

if(!m.clouds) return;

m.clouds.forEach(layer => {

times.push(new Date(m.obsTime));

heights.push(layer.base);

if(layer.cover === "FEW") colors.push("green");
else if(layer.cover === "SCT") colors.push("blue");
else if(layer.cover === "BKN") colors.push("orange");
else if(layer.cover === "OVC") colors.push("red");
else colors.push("gray");

});

});

let trace = {

x:times,
y:heights,

mode:"markers",

marker:{
size:14,
color:colors
},

name:"METAR Cloud Base"

};

let layout = {

title:"Cloud Base Height",

xaxis:{
title:"Time"
},

yaxis:{
title:"Cloud Base (ft AGL)"
}

};

Plotly.newPlot("plot",[trace],layout);

}

// auto load default station
loadData();

</script>

</body>
</html>
