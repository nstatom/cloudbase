<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Airport Cloud Viewer</title>

<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
margin:20px;
}

#controls{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

input{
padding:6px;
font-size:16px;
}

#plot{
height:500px;
border:2px solid #444;
}

.error{color:red;}
.warning{color:orange;}

</style>
</head>

<body>

<h2>Airport Cloud Base Viewer</h2>

<div id="controls">

<label>ICAO:</label>
<input id="icaoInput" value="KSAN">

<label>Hours:</label>
<input id="hoursInput" value="24" type="number">

<button onclick="loadData()">Load</button>

</div>

<div id="messages"></div>

<div id="plot"></div>

<script>

const MAX_HOURS = 168;

async function loadData(){

let icao =
document.getElementById("icaoInput").value.toUpperCase();

let hours =
parseInt(document.getElementById("hoursInput").value);

if(hours > MAX_HOURS){

hours = MAX_HOURS;

document.getElementById("hoursInput").value = MAX_HOURS;

document.getElementById("messages").innerHTML =
"<span class='warning'>Max hours is 168</span>";

}

try{

const response =
await fetch("https://aviationweather.gov/data/cache/metars.cache.csv");

const text =
await response.text();

const rows =
text.split("\n");

let times=[];
let heights=[];
let colors=[];

const now = Date.now();
const cutoff = now - hours*3600000;

rows.forEach(row => {

if(!row.includes(icao)) return;

const cols = row.split(",");

const raw = cols[0];
const time = new Date(cols[2]);

if(time.getTime() < cutoff) return;

const matches =
raw.match(/(FEW|SCT|BKN|OVC)(\d{3})/g);

if(!matches) return;

matches.forEach(layer => {

const cover = layer.substring(0,3);
const height = parseInt(layer.substring(3))*100;

times.push(time);
heights.push(height);

if(cover==="FEW") colors.push("green");
else if(cover==="SCT") colors.push("blue");
else if(cover==="BKN") colors.push("orange");
else if(cover==="OVC") colors.push("red");

});

});

if(times.length===0){

document.getElementById("messages").innerHTML =
"<span class='error'>No cloud data found</span>";

return;

}

let trace = {

x:times,
y:heights,

mode:"markers",

marker:{
size:12,
color:colors
}

};

let layout = {

title:`${icao} Cloud Base Height`,

xaxis:{
title:"Time"
},

yaxis:{
title:"Cloud Base (ft AGL)"
}

};

Plotly.newPlot("plot",[trace],layout);

}
catch(err){

console.error(err);

document.getElementById("messages").innerHTML =
"<span class='error'>Download failed</span>";

}

}

loadData();

</script>

</body>
</html>
